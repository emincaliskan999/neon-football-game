<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Football BO5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="hud">
      <div class="team-side">
        <img id="teamALogoHud" src="assets/team1.png" alt="Takım 1" />
        <span id="scoreA">0</span>
      </div>

      <div class="center-info">
        <div id="matchStatus">BO5 • First to 3</div>
        <div id="timer">Kickoff</div>
      </div>

      <div class="team-side">
        <span id="scoreB">0</span>
        <img id="teamBLogoHud" src="assets/team2.png" alt="Takım 2" />
      </div>
    </div>

    <div class="game-shell">
      <canvas id="gameCanvas" width="420" height="760"></canvas>

      <div id="startOverlay" class="overlay">
        <div class="overlay-card">
          <h1>Neon Football</h1>
          <p>BO5 format • 3 gol atan kazanır</p>
          <button id="startBtn">Maçı Başlat</button>
        </div>
      </div>

      <div id="winnerOverlay" class="overlay hidden">
        <div class="overlay-card">
          <h1 id="winnerText">Kazanan</h1>
          <p>Seri tamamlandı</p>
          <button id="restartBtn">Tekrar Oyna</button>
        </div>
      </div>
    </div>

    <div class="controls-panel">
      <h2>Takım Ayarları</h2>

      <div class="config-row">
        <label>Takım 1 adı</label>
        <input id="teamAName" type="text" value="Team 1" />
      </div>

      <div class="config-row">
        <label>Takım 2 adı</label>
        <input id="teamBName" type="text" value="Team 2" />
      </div>

      <div class="config-row">
        <label>Takım 1 logo yolu</label>
        <input id="teamALogoPath" type="text" value="assets/team1.png" />
      </div>

      <div class="config-row">
        <label>Takım 2 logo yolu</label>
        <input id="teamBLogoPath" type="text" value="assets/team2.png" />
      </div>

      <button id="applyBtn">Ayarları Uygula</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
